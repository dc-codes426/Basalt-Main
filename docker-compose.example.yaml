services:
  vultiserver:
    build: ../basalt-vultiserver
    container_name: basalt-vultiserver
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/root/config.yaml
      - vultiserver_vaults:/root/vaults
    depends_on:
      - redis
  redis:
    image: redis:latest
    container_name: basalt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  redis_data:
  vultiserver_vaults:
