services:
  networking:
    build: ../basalt-networking
    container_name: basalt-networking
    ports:
      - "80:80"
    environment:
      - UPSTREAM_URL=http://vultiserver:8080
    depends_on:
      - vultiserver
  vultiserver:
    build: ../basalt-vultiserver
    container_name: basalt-vultiserver
    volumes:
      - ./config.yaml:/root/config.yaml
      - vultiserver_vaults:/root/vaults
    depends_on:
      - redis
  redis:
    image: redis:latest
    container_name: basalt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  redis_data:
  vultiserver_vaults:
