services:
  networking:
    image: ghcr.io/dc-codes426/basalt-networking:887ecdd8289cf2a386ae5bdf87699e7417840d03
    container_name: basalt-networking
    ports:
      - "80:80"
    environment:
      - UPSTREAM_URL=http://vultiserver:8080
    depends_on:
      - vultiserver
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    restart: always

  vultiserver:
    image: ghcr.io/dc-codes426/basalt-vultiserver:01013b328735061ee034d5015557d49008c7ca80
    container_name: basalt-vultiserver
    entrypoint: /bin/sh /basalt/vultiserver-entrypoint.sh
    ports:
      - "8080:8080"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - ./dstack-derive.sh:/dstack-derive.sh:ro
      - ./vultiserver-entrypoint.sh:/basalt/vultiserver-entrypoint.sh:ro
      - vultiserver_vaults:/root/vaults
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_VAULTS_PATH: "vaults"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RELAY_SERVER: ${RELAY_SERVER:-https://api.vultisig.com/router}
      BLOCK_STORAGE_HOST: http://minio:9000
      BLOCK_STORAGE_REGION: us-east-1
      BLOCK_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      BLOCK_STORAGE_BUCKET: ${BLOCK_STORAGE_BUCKET:-vaults}
    depends_on:
      - redis
      - minio-init
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: basalt-redis
    entrypoint: /bin/sh /basalt/redis-entrypoint.sh
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - ./dstack-derive.sh:/dstack-derive.sh:ro
      - ./redis-entrypoint.sh:/basalt/redis-entrypoint.sh:ro
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    restart: always

  admin-internal:
    image: ghcr.io/dc-codes426/basalt-admin-internal:62a127f9760c1409d1e423cd9288cd845660a8bb
    container_name: basalt-admin-internal
    entrypoint: /bin/sh /basalt/admin-internal-entrypoint.sh
    ports:
      - "3001:3000"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - ./dstack-derive.sh:/dstack-derive.sh:ro
      - ./admin-internal-entrypoint.sh:/basalt/admin-internal-entrypoint.sh:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    restart: always

  minio:
    image: minio/minio:latest
    container_name: basalt-minio
    entrypoint: /bin/sh /basalt/minio-entrypoint.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SSE_KEY_PATH: basalt/vault-encryption
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - ./dstack-derive.sh:/dstack-derive.sh:ro
      - ./minio-entrypoint.sh:/basalt/minio-entrypoint.sh:ro
      - minio_data:/data
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    restart: always

  minio-init:
    image: minio/mc:latest
    container_name: basalt-minio-init
    depends_on:
      - minio
    entrypoint: /bin/sh /basalt/minio-init-entrypoint.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      BLOCK_STORAGE_BUCKET: ${BLOCK_STORAGE_BUCKET:-vaults}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - ./dstack-derive.sh:/dstack-derive.sh:ro
      - ./minio-init-entrypoint.sh:/basalt/minio-init-entrypoint.sh:ro

volumes:
  redis_data:
  vultiserver_vaults:
  minio_data:
