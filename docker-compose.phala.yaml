services:
  networking:
    image: ghcr.io/dc-codes426/basalt-networking:36a112a60beb32df085a5fa50f5dc7ceab656eb1
    container_name: basalt-networking
    env_file: .env
    ports:
      - "80:80"
    environment:
      - UPSTREAM_URL=http://vultiserver:8080
      - AUTH_URL=http://auth:3000
    depends_on:
      - vultiserver
      - auth
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  vultiserver:
    image: ghcr.io/dc-codes426/basalt-vultiserver:243bf2071419f5565fbfd96ea12438f0a1d48ce3
    container_name: basalt-vultiserver
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - vultiserver_vaults:/root/vaults
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_VAULTS_PATH: "vaults"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RELAY_SERVER: ${RELAY_SERVER:-https://api.vultisig.com/router}
      BLOCK_STORAGE_HOST: http://minio:9000
      BLOCK_STORAGE_REGION: us-east-1
      BLOCK_STORAGE_BUCKET: ${BLOCK_STORAGE_BUCKET:-vaults}
      BLOCK_STORAGE_ACCESS_KEY: vultiserver
      BLOCK_STORAGE_SECRET: ${MINIO_VULTISERVER_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  redis:
    image: redis:8
    container_name: basalt-redis
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $REDIS_PASSWORD ping"]
      interval: 30s
      timeout: 1s
      retries: 3
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - SETPCAP
    mem_limit: 256m
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  admin-internal:
    image: ghcr.io/dc-codes426/basalt-admin-internal:30eff481a397c41ffe7f48f7c61c99bade410494
    container_name: basalt-admin-internal
    env_file: .env
    ports:
      - "3001:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: basalt-minio
    env_file: .env
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_BROWSER: "off"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - minio_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: basalt-minio-init
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${BLOCK_STORAGE_BUCKET};
      mc anonymous set none local/$${BLOCK_STORAGE_BUCKET};
      mc encrypt set sse-s3 local/$${BLOCK_STORAGE_BUCKET} || echo 'SSE not available - skipped';
      mc admin user add local vultiserver $${MINIO_VULTISERVER_PASSWORD} || true;
      mc admin policy attach local readwrite --user vultiserver;
      mc admin user info local vultiserver > /dev/null || { echo 'ERROR: vultiserver user not found'; exit 1; };
      echo 'MinIO init completed successfully.';
      "
    environment:
      BLOCK_STORAGE_BUCKET: ${BLOCK_STORAGE_BUCKET:-vaults}

  auth:
    image: ghcr.io/dc-codes426/basalt-auth:808b06a7a33086efd72512e9ea70a6e79077d46e
    container_name: basalt-auth
    env_file: .env
    ports:
      - "3003:3000"
    volumes:
      - auth_data:/data
    environment:
      AUTH_DB_PATH: /data/auth.db
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  redis_data:
  vultiserver_vaults:
  minio_data:
  auth_data:
