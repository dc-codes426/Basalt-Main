openapi: 3.1.0
info:
  title: Vultiserver API
  description: |
    TSS (Threshold Signature Scheme) server for keygen, keysign, and reshare
    operations supporting ECDSA, EdDSA, and MLDSA via GG20 and DKLS protocols.

    Vultiserver runs an Echo HTTP server and an asynq worker for async TSS
    operations backed by Redis. Most mutating endpoints enqueue an async task
    and return immediately.
  version: 1.0.0
#  contact:
#    name: Vultisig
#    url: https://github.com/vultisig/vultiserver
  license:
    name: MIT
    identifier: MIT

servers:
#  - url: https://api.vultisig.com/router
#    description: Production
  - url: http://localhost:8080
    description: Local development

paths:
  /ping:
    get:
      operationId: ping
      summary: Health check
      description: Returns a simple string indicating the server is running.
      tags: [Health]
      responses:
        "200":
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: Vultiserver is running
        "503":
          description: One or more dependencies are unhealthy
          content:
            text/plain:
              schema:
                type: string

  /health:
    get:
      operationId: health
      summary: Dependency health check
      description: |
        Returns the health status of all dependent services (vultiserver,
        networking, redis). Proxied from the admin-internal service.
      tags: [Health]
      responses:
        "200":
          description: All dependencies are healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more dependencies are unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /vault/create:
    post:
      operationId: createVault
      summary: Initiate vault creation
      description: |
        Validates the vault creation request and returns a challenge nonce
        that must be signed with the client's passkey. The keygen ceremony
        is not started until the client submits a valid proof via
        `/vault/create/prove`.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultCreateRequest"
      responses:
        "200":
          description: Challenge issued; client must prove passkey ownership via `/vault/create/prove`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/create/prove:
    post:
      operationId: createVaultProof
      summary: Submit passkey proof to authorize vault creation
      description: |
        Completes the vault creation authorization by providing a passkey
        signature over the challenge nonce returned by `/vault/create`. The
        auth service verifies the signature against the stored public key
        for the given public key hash. On success, the keygen ceremony is
        initiated.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Proof verified; vault creation initiated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed (invalid signature or expired challenge).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/reshare:
    post:
      operationId: reshareVault
      summary: Initiate vault reshare
      description: |
        Validates the reshare request and returns a challenge nonce that must
        be signed with the client's passkey. The reshare task is not enqueued
        until the client submits a valid proof via `/vault/reshare/prove`.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReshareRequest"
      responses:
        "200":
          description: Challenge issued; client must prove passkey ownership via `/vault/reshare/prove`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/reshare/prove:
    post:
      operationId: reshareVaultProof
      summary: Submit passkey proof to authorize reshare
      description: |
        Completes the reshare authorization by providing a passkey signature
        over the challenge nonce returned by `/vault/reshare`. On success,
        the reshare task is enqueued.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Proof verified; reshare task enqueued.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed (invalid signature or expired challenge).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/get:
    post:
      operationId: getVault
      summary: Initiate vault retrieval
      description: |
        Validates the request and returns a challenge nonce that must be
        signed with the client's passkey. The vault data is not returned
        until the client submits a valid proof via `/vault/get/prove`.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultGetRequest"
      responses:
        "200":
          description: Challenge issued; client must prove passkey ownership via `/vault/get/prove`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Vault not found

  /vault/get/prove:
    post:
      operationId: getVaultProof
      summary: Submit passkey proof to retrieve vault
      description: |
        Completes the vault retrieval authorization by providing a passkey
        signature over the challenge nonce. On success, returns the
        decrypted vault metadata.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Proof verified; vault metadata returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultGetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Vault not found

  /vault/exist/{publicKeyECDSA}:
    get:
      operationId: existVault
      summary: Check if a vault exists
      description: |
        Checks whether a vault backup file exists for the given ECDSA public key.
      tags: [Vault]
      parameters:
        - $ref: "#/components/parameters/publicKeyECDSA"
      responses:
        "200":
          description: Vault exists
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Vault not found

  /vault/sign:
    post:
      operationId: signMessages
      summary: Initiate a signing session
      description: |
        Validates the signing request and returns a challenge nonce that must
        be signed with the client's passkey. The actual signing task is not
        enqueued until the client submits a valid proof via `/vault/sign/prove`.
      tags: [Signing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeysignRequest"
      responses:
        "200":
          description: Challenge issued; client must prove passkey ownership via `/vault/sign/prove`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/sign/prove:
    post:
      operationId: signProof
      summary: Submit passkey proof to authorize signing
      description: |
        Completes the signing authorization by providing a passkey signature
        over the challenge nonce returned by `/vault/sign`. The auth service
        verifies the signature against the stored public key for the given
        public key hash. On success, the signing task is enqueued and the
        async task ID is returned.
      tags: [Signing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Proof verified; signing task enqueued.
          content:
            application/json:
              schema:
                type: string
                description: Asynq task ID for polling the signing result
                example: "asynq:task:abc123"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed (invalid signature or expired challenge).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/mldsa:
    post:
      operationId: createMldsaVault
      summary: Initiate ML-DSA key addition
      description: |
        Validates the request and returns a challenge nonce that must be
        signed with the client's passkey. The ML-DSA key creation is not
        started until the client submits a valid proof via `/vault/mldsa/prove`.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMldsaRequest"
      responses:
        "200":
          description: Challenge issued; client must prove passkey ownership via `/vault/mldsa/prove`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/mldsa/prove:
    post:
      operationId: createMldsaVaultProof
      summary: Submit passkey proof to authorize ML-DSA key addition
      description: |
        Completes the ML-DSA authorization. On success, the ML-DSA key
        creation task is enqueued.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Proof verified; ML-DSA key creation started.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/passkey/add:
    post:
      operationId: addPasskey
      summary: Initiate adding a passkey to a vault
      description: |
        Returns a challenge nonce that must be signed with an existing
        authorized passkey. On successful proof via `/vault/passkey/add/prove`,
        the new passkey is registered to the vault.
      tags: [Passkey]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPasskeyRequest"
      responses:
        "200":
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Vault not found or no passkeys registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /vault/passkey/add/prove:
    post:
      operationId: addPasskeyProof
      summary: Submit proof to authorize adding a passkey
      description: |
        The signature must be from an existing passkey authorized for the
        vault. On success, the new passkey is registered.
      tags: [Passkey]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPasskeyProofRequest"
      responses:
        "200":
          description: Passkey added successfully.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /vault/passkey/remove:
    post:
      operationId: removePasskey
      summary: Initiate removing a passkey from a vault
      description: |
        Returns a challenge nonce that must be signed with a different
        authorized passkey than the one being removed.
      tags: [Passkey]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemovePasskeyRequest"
      responses:
        "200":
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Vault not found or no passkeys registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /vault/passkey/remove/prove:
    post:
      operationId: removePasskeyProof
      summary: Submit proof to authorize removing a passkey
      description: |
        The signature must be from a different passkey than the one being
        removed. The last passkey on a vault cannot be removed.
      tags: [Passkey]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemovePasskeyProofRequest"
      responses:
        "200":
          description: Passkey removed successfully.
        "400":
          description: Cannot remove the last passkey, or validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Proof verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    publicKeyECDSA:
      name: publicKeyECDSA
      in: path
      required: true
      description: 66-character hex-encoded ECDSA public key identifying the vault
      schema:
        type: string
        pattern: "^[0-9a-fA-F]{66}$"
        minLength: 66
        maxLength: 66

  responses:
    BadRequest:
      description: Validation error or malformed request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded (10 req/s, 100 burst)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message
          example: "fail to parse request, err: invalid session_id"

    ContainerStatus:
      type: object
      required:
        - name
        - healthy
        - detail
      properties:
        name:
          type: string
          description: Service name
        healthy:
          type: boolean
          description: Whether the service responded successfully
        detail:
          type: string
          description: Response body on success, or error message on failure

    HealthResponse:
      type: object
      required:
        - containers
      properties:
        containers:
          type: array
          items:
            $ref: "#/components/schemas/ContainerStatus"
          description: Health status of each monitored service

    LibType:
      type: integer
      description: TSS library/protocol type
      enum: [0, 1, 2]
      x-enum-varnames: [GG20, DKLS, KeyImport]
      x-enum-descriptions:
        - GG20 threshold signature protocol
        - DKLS threshold signature protocol
        - Key import mode

    ReshareType:
      type: integer
      description: Reshare operation type
      enum: [0, 1]
      x-enum-varnames: [Normal, Plugin]

    VaultCreateRequest:
      type: object
      required:
        - session_id
        - hex_encryption_key
        - hex_chain_code
        - encryption_password
        - passkey_pubkey_hash
      properties:
        session_id:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        hex_chain_code:
          type: string
          description: Hex-encoded chain code for key derivation
        local_party_id:
          type: string
          description: Identifier for the local TSS party (optional; server assigns one if omitted)
        encryption_password:
          type: string
          description: Password used to encrypt the vault backup
        lib_type:
          $ref: "#/components/schemas/LibType"
        passkey_pubkey_hash:
          type: string
          description: |
            SHA-256 hash of the client's passkey public key, hex-encoded.
            Used together with the session ID to key the challenge. The full
            public key is provided later in `/vault/create/prove`.
          pattern: "^[0-9a-fA-F]{64}$"

    VaultGetResponse:
      type: object
      properties:
        public_key_ecdsa:
          type: string
          description: Hex-encoded ECDSA public key
        public_key_eddsa:
          type: string
          description: Hex-encoded EdDSA public key
        hex_chain_code:
          type: string
          description: Hex-encoded chain code
        local_party_id:
          type: string
          description: Local TSS party identifier

    ReshareRequest:
      type: object
      required:
        - public_key
        - session_id
        - hex_encryption_key
        - hex_chain_code
        - old_parties
        - encryption_password
        - passkey_pubkey_hash
      properties:
        public_key:
          type: string
          description: Existing vault public key
        session_id:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        hex_chain_code:
          type: string
          description: Hex-encoded chain code
        local_party_id:
          type: string
          description: Local TSS party identifier
        old_parties:
          type: array
          items:
            type: string
          description: List of party IDs from the previous share set
        encryption_password:
          type: string
          minLength: 6
          description: Encryption password (minimum 6 characters)
        passkey_pubkey_hash:
          type: string
          description: SHA-256 hash of the client's passkey public key, hex-encoded.
          pattern: "^[0-9a-fA-F]{64}$"
        old_reshare_prefix:
          type: string
          description: Prefix from previous reshare operation (if any)
        lib_type:
          $ref: "#/components/schemas/LibType"
        reshare_type:
          $ref: "#/components/schemas/ReshareType"

    KeysignRequest:
      type: object
      required:
        - public_key
        - messages
        - session
        - hex_encryption_key
        - derive_path
        - vault_password
        - passkey_pubkey_hash
      properties:
        public_key:
          type: string
          description: Public key identifying the vault backup file
        messages:
          type: array
          items:
            type: string
          description: Hex-encoded messages to sign
          minItems: 1
        session:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        derive_path:
          type: string
          description: BIP-32 derivation path for the signing key
        is_ecdsa:
          type: boolean
          description: Use ECDSA signing (true) or EdDSA (false)
          default: false
        vault_password:
          type: string
          description: Password to decrypt the vault backup
        chain:
          type: string
          description: Target blockchain (e.g. BTC, ETH)
        mldsa:
          type: boolean
          description: Use ML-DSA (post-quantum Dilithium) signing
          default: false
        passkey_pubkey_hash:
          type: string
          description: |
            SHA-256 hash of the client's passkey public key, hex-encoded.
            Used together with the session ID to key the challenge. The full
            public key is provided later in `/vault/sign/prove`.
          pattern: "^[0-9a-fA-F]{64}$"

    ChallengeResponse:
      type: object
      required:
        - challenge
        - session
      properties:
        challenge:
          type: string
          description: |
            Hex-encoded random nonce (32 bytes). The client must sign this
            value with their passkey and submit the result to the corresponding
            proof endpoint.
          pattern: "^[0-9a-fA-F]{64}$"
        session:
          type: string
          format: uuid
          description: |
            Session identifier binding this challenge to the original request.
            Must be included in the proof submission.
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) after which the challenge is no longer valid.

    ProofRequest:
      type: object
      required:
        - session
        - passkey_pubkey
        - signature
      properties:
        session:
          type: string
          format: uuid
          description: |
            Session identifier from the original request. Together with the
            SHA-256 hash of `passkey_pubkey`, this identifies the challenge
            to verify against.
        passkey_pubkey:
          type: string
          description: |
            The client's full passkey public key (ECDSA P-256 / secp256r1),
            hex-encoded. The server computes SHA-256(passkey_pubkey) to look
            up the challenge issued during the initial request.
        signature:
          type: string
          description: |
            Hex-encoded signature over the challenge nonce, produced by the
            client's passkey (ECDSA P-256 / secp256r1).

    VaultGetRequest:
      type: object
      required:
        - public_key_ecdsa
        - x_password
        - passkey_pubkey_hash
      properties:
        public_key_ecdsa:
          type: string
          description: 66-character hex-encoded ECDSA public key identifying the vault.
          pattern: "^[0-9a-fA-F]{66}$"
          minLength: 66
          maxLength: 66
        x_password:
          type: string
          description: Encryption password for vault decryption.
        passkey_pubkey_hash:
          type: string
          description: SHA-256 hash of the client's passkey public key, hex-encoded.
          pattern: "^[0-9a-fA-F]{64}$"

    CreateMldsaRequest:
      type: object
      required:
        - public_key
        - session_id
        - hex_encryption_key
        - encryption_password
        - passkey_pubkey_hash
      properties:
        public_key:
          type: string
          description: 66-character hex-encoded ECDSA public key of the existing vault
          pattern: "^[0-9a-fA-F]{66}$"
        session_id:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        encryption_password:
          type: string
          description: Encryption password for the vault
        passkey_pubkey_hash:
          type: string
          description: SHA-256 hash of the client's passkey public key, hex-encoded.
          pattern: "^[0-9a-fA-F]{64}$"

    AddPasskeyRequest:
      type: object
      required:
        - vault_pubkey
        - new_passkey_pubkey_hash
        - passkey_pubkey_hash
      properties:
        vault_pubkey:
          type: string
          description: Public key of the vault to add the passkey to, hex-encoded.
        new_passkey_pubkey_hash:
          type: string
          description: SHA-256 hash of the new passkey's public key, hex-encoded.
          pattern: "^[0-9a-fA-F]{64}$"
        passkey_pubkey_hash:
          type: string
          description: |
            SHA-256 hash of the existing authorized passkey used to prove
            ownership. This passkey signs the challenge.
          pattern: "^[0-9a-fA-F]{64}$"

    AddPasskeyProofRequest:
      type: object
      required:
        - session
        - passkey_pubkey
        - signature
        - new_passkey_pubkey
      properties:
        session:
          type: string
          format: uuid
          description: Session identifier from the challenge response.
        passkey_pubkey:
          type: string
          description: |
            Full public key of the existing authorized passkey (P-256),
            hex-encoded. Used to verify the signature.
        signature:
          type: string
          description: |
            Hex-encoded signature over the challenge nonce, produced by
            the existing authorized passkey.
        new_passkey_pubkey:
          type: string
          description: |
            Full public key of the new passkey to register (P-256),
            hex-encoded. The server computes its SHA-256 hash and
            registers it to the vault.

    RemovePasskeyRequest:
      type: object
      required:
        - vault_pubkey
        - remove_passkey_pubkey_hash
        - passkey_pubkey_hash
      properties:
        vault_pubkey:
          type: string
          description: Public key of the vault, hex-encoded.
        remove_passkey_pubkey_hash:
          type: string
          description: SHA-256 hash of the passkey to remove, hex-encoded.
          pattern: "^[0-9a-fA-F]{64}$"
        passkey_pubkey_hash:
          type: string
          description: |
            SHA-256 hash of the authorized passkey signing the challenge.
            Must be different from `remove_passkey_pubkey_hash`.
          pattern: "^[0-9a-fA-F]{64}$"

    RemovePasskeyProofRequest:
      type: object
      required:
        - session
        - passkey_pubkey
        - signature
        - remove_passkey_pubkey_hash
      properties:
        session:
          type: string
          format: uuid
          description: Session identifier from the challenge response.
        passkey_pubkey:
          type: string
          description: |
            Full public key of the authorized passkey signing the proof
            (P-256), hex-encoded. Must be different from the passkey
            being removed.
        signature:
          type: string
          description: |
            Hex-encoded signature over the challenge nonce, produced by
            the authorized passkey.
        remove_passkey_pubkey_hash:
          type: string
          description: |
            SHA-256 hash of the passkey to remove, hex-encoded.

