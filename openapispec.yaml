openapi: 3.1.0
info:
  title: Vultiserver API
  description: |
    TSS (Threshold Signature Scheme) server for keygen, keysign, and reshare
    operations supporting ECDSA, EdDSA, and MLDSA via GG20 and DKLS protocols.

    Vultiserver runs an Echo HTTP server and an asynq worker for async TSS
    operations backed by Redis. Most mutating endpoints enqueue an async task
    and return immediately.
  version: 1.0.0
#  contact:
#    name: Vultisig
#    url: https://github.com/vultisig/vultiserver
  license:
    name: MIT
    identifier: MIT

servers:
#  - url: https://api.vultisig.com/router
#    description: Production
  - url: http://localhost:8080
    description: Local development

paths:
  /ping:
    get:
      operationId: ping
      summary: Health check
      description: Returns a simple string indicating the server is running.
      tags: [Health]
      responses:
        "200":
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: Vultiserver is running
        "503":
          description: One or more dependencies are unhealthy
          content:
            text/plain:
              schema:
                type: string

  /health:
    get:
      operationId: health
      summary: Dependency health check
      description: |
        Returns the health status of all dependent services (vultiserver,
        networking, redis). Proxied from the admin-internal service.
      tags: [Health]
      responses:
        "200":
          description: All dependencies are healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more dependencies are unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /vault/create:
    post:
      operationId: createVault
      summary: Initiate vault creation
      description: |
        Validates the vault creation request and returns a challenge nonce
        that must be signed with the client's passkey. The keygen ceremony
        is not started until the client submits a valid proof via
        `/vault/create/proof`.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultCreateRequest"
      responses:
        "200":
          description: Challenge issued; client must prove passkey ownership via `/vault/create/proof`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/create/proof:
    post:
      operationId: createVaultProof
      summary: Submit passkey proof to authorize vault creation
      description: |
        Completes the vault creation authorization by providing a passkey
        signature over the challenge nonce returned by `/vault/create`. The
        auth service verifies the signature against the stored public key
        for the given public key hash. On success, the keygen ceremony is
        initiated.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Proof verified; vault creation initiated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed (invalid signature or expired challenge).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/reshare:
    post:
      operationId: reshareVault
      summary: Reshare vault key shares
      description: |
        Redistributes vault shares among a new set of parties. Enqueues an
        async `key:reshare` (GG20) or `key:reshareDKLS` (DKLS) task with an
        8-minute timeout. Requires a minimum 6-character encryption password.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReshareRequest"
      responses:
        "204":
          description: Reshare task enqueued
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/get/{publicKeyECDSA}:
    get:
      operationId: getVault
      summary: Retrieve vault metadata
      description: |
        Retrieves and decrypts a vault backup file by its ECDSA public key.
        The encryption password must be provided via the `x-password` header
        (base64-encoded or plaintext).
      tags: [Vault]
      parameters:
        - $ref: "#/components/parameters/publicKeyECDSA"
        - name: x-password
          in: header
          required: true
          description: |
            Encryption password for vault decryption. May be base64-encoded
            or sent as plaintext; the server attempts base64 decoding first.
          schema:
            type: string
      responses:
        "200":
          description: Vault metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultGetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Vault not found

  /vault/exist/{publicKeyECDSA}:
    get:
      operationId: existVault
      summary: Check if a vault exists
      description: |
        Checks whether a vault backup file exists for the given ECDSA public key.
      tags: [Vault]
      parameters:
        - $ref: "#/components/parameters/publicKeyECDSA"
      responses:
        "200":
          description: Vault exists
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Vault not found

  /vault/sign:
    post:
      operationId: signMessages
      summary: Initiate a signing session
      description: |
        Validates the signing request and returns a challenge nonce that must
        be signed with the client's passkey. The actual signing task is not
        enqueued until the client submits a valid proof via `/vault/sign/proof`.
      tags: [Signing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeysignRequest"
      responses:
        "200":
          description: Challenge issued; client must prove passkey ownership via `/vault/sign/proof`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/sign/proof:
    post:
      operationId: signProof
      summary: Submit passkey proof to authorize signing
      description: |
        Completes the signing authorization by providing a passkey signature
        over the challenge nonce returned by `/vault/sign`. The auth service
        verifies the signature against the stored public key for the given
        public key hash. On success, the signing task is enqueued and the
        async task ID is returned.
      tags: [Signing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofRequest"
      responses:
        "200":
          description: Proof verified; signing task enqueued.
          content:
            application/json:
              schema:
                type: string
                description: Asynq task ID for polling the signing result
                example: "asynq:task:abc123"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Proof verification failed (invalid signature or expired challenge).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /vault/mldsa:
    post:
      operationId: createMldsaVault
      summary: Add ML-DSA key to existing vault
      description: |
        Adds a post-quantum ML-DSA (Dilithium) key to an existing vault.
        The vault must already exist in block storage. Enqueues an async
        `key:createMldsa` task with a 5-minute timeout.
      tags: [Vault]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMldsaRequest"
      responses:
        "200":
          description: ML-DSA key creation task enqueued
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

components:
  parameters:
    publicKeyECDSA:
      name: publicKeyECDSA
      in: path
      required: true
      description: 66-character hex-encoded ECDSA public key identifying the vault
      schema:
        type: string
        pattern: "^[0-9a-fA-F]{66}$"
        minLength: 66
        maxLength: 66

  responses:
    BadRequest:
      description: Validation error or malformed request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded (10 req/s, 100 burst)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message
          example: "fail to parse request, err: invalid session_id"

    ContainerStatus:
      type: object
      required:
        - name
        - healthy
        - detail
      properties:
        name:
          type: string
          description: Service name
        healthy:
          type: boolean
          description: Whether the service responded successfully
        detail:
          type: string
          description: Response body on success, or error message on failure

    HealthResponse:
      type: object
      required:
        - containers
      properties:
        containers:
          type: array
          items:
            $ref: "#/components/schemas/ContainerStatus"
          description: Health status of each monitored service

    LibType:
      type: integer
      description: TSS library/protocol type
      enum: [0, 1, 2]
      x-enum-varnames: [GG20, DKLS, KeyImport]
      x-enum-descriptions:
        - GG20 threshold signature protocol
        - DKLS threshold signature protocol
        - Key import mode

    ReshareType:
      type: integer
      description: Reshare operation type
      enum: [0, 1]
      x-enum-varnames: [Normal, Plugin]

    VaultCreateRequest:
      type: object
      required:
        - session_id
        - hex_encryption_key
        - hex_chain_code
        - encryption_password
      properties:
        session_id:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        hex_chain_code:
          type: string
          description: Hex-encoded chain code for key derivation
        local_party_id:
          type: string
          description: Identifier for the local TSS party (optional; server assigns one if omitted)
        encryption_password:
          type: string
          description: Password used to encrypt the vault backup
        lib_type:
          $ref: "#/components/schemas/LibType"

    VaultGetResponse:
      type: object
      properties:
        public_key_ecdsa:
          type: string
          description: Hex-encoded ECDSA public key
        public_key_eddsa:
          type: string
          description: Hex-encoded EdDSA public key
        hex_chain_code:
          type: string
          description: Hex-encoded chain code
        local_party_id:
          type: string
          description: Local TSS party identifier

    ReshareRequest:
      type: object
      required:
        - public_key
        - session_id
        - hex_encryption_key
        - hex_chain_code
        - old_parties
        - encryption_password
      properties:
        public_key:
          type: string
          description: Existing vault public key
        session_id:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        hex_chain_code:
          type: string
          description: Hex-encoded chain code
        local_party_id:
          type: string
          description: Local TSS party identifier
        old_parties:
          type: array
          items:
            type: string
          description: List of party IDs from the previous share set
        encryption_password:
          type: string
          minLength: 6
          description: Encryption password (minimum 6 characters)
        old_reshare_prefix:
          type: string
          description: Prefix from previous reshare operation (if any)
        lib_type:
          $ref: "#/components/schemas/LibType"
        reshare_type:
          $ref: "#/components/schemas/ReshareType"

    KeysignRequest:
      type: object
      required:
        - public_key
        - messages
        - session
        - hex_encryption_key
        - derive_path
        - vault_password
      properties:
        public_key:
          type: string
          description: Public key identifying the vault backup file
        messages:
          type: array
          items:
            type: string
          description: Hex-encoded messages to sign
          minItems: 1
        session:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        derive_path:
          type: string
          description: BIP-32 derivation path for the signing key
        is_ecdsa:
          type: boolean
          description: Use ECDSA signing (true) or EdDSA (false)
          default: false
        vault_password:
          type: string
          description: Password to decrypt the vault backup
        chain:
          type: string
          description: Target blockchain (e.g. BTC, ETH)
        mldsa:
          type: boolean
          description: Use ML-DSA (post-quantum Dilithium) signing
          default: false

    ChallengeResponse:
      type: object
      required:
        - challenge
        - session
      properties:
        challenge:
          type: string
          description: |
            Hex-encoded random nonce (32 bytes). The client must sign this
            value with their passkey and submit the result to the corresponding
            proof endpoint.
          pattern: "^[0-9a-fA-F]{64}$"
        session:
          type: string
          format: uuid
          description: |
            Session identifier binding this challenge to the original request.
            Must be included in the proof submission.
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) after which the challenge is no longer valid.

    ProofRequest:
      type: object
      required:
        - session
        - challenge
        - passkey_pubkey_hash
        - signature
      properties:
        session:
          type: string
          format: uuid
          description: Session identifier from the challenge response.
        challenge:
          type: string
          description: The challenge nonce that was signed.
          pattern: "^[0-9a-fA-F]{64}$"
        passkey_pubkey_hash:
          type: string
          description: |
            SHA-256 hash of the client's passkey public key, hex-encoded.
            Used to look up the registered public key for verification.
          pattern: "^[0-9a-fA-F]{64}$"
        signature:
          type: string
          description: |
            Hex-encoded signature over the challenge nonce, produced by the
            client's passkey (ECDSA P-256 / secp256r1).

    CreateMldsaRequest:
      type: object
      required:
        - public_key
        - session_id
        - hex_encryption_key
        - encryption_password
      properties:
        public_key:
          type: string
          description: 66-character hex-encoded ECDSA public key of the existing vault
          pattern: "^[0-9a-fA-F]{66}$"
        session_id:
          type: string
          format: uuid
          description: Unique session identifier (UUID)
        hex_encryption_key:
          type: string
          description: 32-byte hex-encoded encryption key
          pattern: "^[0-9a-fA-F]{64}$"
        encryption_password:
          type: string
          description: Encryption password for the vault

tags:
  - name: Health
    description: Server health and liveness
  - name: Vault
    description: Vault lifecycle — create, reshare, migrate, import, retrieve
  - name: Signing
    description: Message signing operations
